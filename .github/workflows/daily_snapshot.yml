name: Daily Snapshot (23:55 IST)

# Runs every day at 23:55 IST = 18:25 UTC.
# Captures the day's CLOSING totals (5 min before midnight) and labels the row
# with TOMORROW's date so the next-day dashboard reads it as D-1 = yesterday's
# close-of-business.
on:
  schedule:
    - cron: "25 18 * * *"
  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run snapshot script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_CREDS_JSON: ${{ secrets.GCP_CREDS_JSON }}
        run: python scripts/capture_daily_snapshot.py
