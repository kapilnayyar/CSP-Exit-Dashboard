name: Daily Snapshot (23:30 IST)

# Runs every day at 23:30 IST = 18:00 UTC.
# Moved earlier from 23:55 -> 23:30 on 2026-06-25 because a recurring "+7 phantom
# dedup drop" was hitting the cron 5 days in a row. The flicker pattern suggests
# a midnight inventory refresh job was overlapping the 23:55 window. Earlier slot
# avoids that overlap. The sanity floor in capture_daily_snapshot.py is the
# backstop if it still happens.
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run snapshot script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_CREDS_JSON: ${{ secrets.GCP_CREDS_JSON }}
        run: python scripts/capture_daily_snapshot.py
