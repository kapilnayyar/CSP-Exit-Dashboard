name: Daily Snapshot (01:30 IST)

# Runs every day at 01:30 IST (= 20:00 UTC previous day).
# Moved from 23:30 IST -> 01:30 IST on 2026-07-14 per Kapil's business-day
# rule: edits made before 01:30 IST count as previous day's work, after
# 01:30 IST count as current day. Cron at 01:30 IST captures the tail end
# of the prior business day so late-evening sheet edits aren't missed.
# Row date labelling stays as calendar IST date of the cron run: a row
# dated 2026-07-15 captured at 01:30 IST on 15-Jul contains state at end
# of business day 14-Jul (matches Kapil's D+1 report convention).
#
# GH Actions `schedule:` is best-effort on free tier and silently drops
# runs during high-load windows (happened on 18-Jul-2026 and 19-Jul-2026,
# leaving the dashboard stuck on the prior day's report). We add one
# fallback slot 30 min after the primary. capture_daily_snapshot.py
# already handles same-day re-runs idempotently: it detects the
# existing row and overwrites it in place with fresh values (see
# line ~260, "Row for {today_str} already exists ... will overwrite").
# So if 20:00 UTC fires, 20:30 UTC just refreshes the same row.
# If 20:00 misses, 20:30 catches. Two slots is plenty of resilience —
# a 3rd slot (kept briefly on 20-Jul-2026) tended to trip Google
# Sheets / Metabase rate limits and generated spurious failure emails
# after the row was already correctly written.
on:
  schedule:
    - cron: "0 20 * * *"    # 01:30 IST - primary
    - cron: "30 20 * * *"   # 02:00 IST - fallback
  workflow_dispatch:  # also allow manual trigger from GitHub UI

# Prevent the fallback slot from racing the primary if it happens to
# start while the primary is still finishing. If a run is already
# in-progress, the new one queues and starts only after the previous
# completes; the idempotent overwrite in capture_daily_snapshot.py
# then just refreshes the same row cleanly.
concurrency:
  group: daily-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run snapshot script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_CREDS_JSON: ${{ secrets.GCP_CREDS_JSON }}
        run: python scripts/capture_daily_snapshot.py
