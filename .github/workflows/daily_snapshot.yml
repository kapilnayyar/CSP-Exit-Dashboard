name: Daily Snapshot (00:00 IST)

# Runs every day at 00:00 IST = 18:30 UTC the previous day.
# Captures the day's opening totals into the 'Daily Totals' Google Sheet tab
# so Tab 5 D-1 always reflects yesterday's close-of-business state.
on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Run snapshot script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GCP_CREDS_JSON: ${{ secrets.GCP_CREDS_JSON }}
        run: python scripts/capture_daily_snapshot.py
